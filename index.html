<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirty Casino</title>
    <link href="styles.css" rel="stylesheet" type="text/css" media="all">
  </head>
  <body>
    <h1>Welcome to the Dirty Casino!</h1>
    
    <p class="balance">Balance:</p>
    <p>Don't spend it all in one place</p>
    
    <button id="spin" type="button">Spin!</button>
    <p class="result"></p>
	
	<button id="blackjackOpen" type="button">Blackjack</button> 
	<dialog id="blackjackDialog">
		<h2>Blackjack</h2>
		<div class="container">
			<div class="dealer"><h2>Dealer</h2></div>
			<div class="hand">Blackjack Coming Soon!</div>
			<div class="options">
				<button id="hitBtn">Hit</button>
				<button id="stayBtn">Stay</button>
			</div>
		</div>
	</dialog>

	
    <script src="casino.js"></script>
	
  </body>
</html>
